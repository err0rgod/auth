{% extends 'base.html' %}

{% block title %}Register - Auth System{% endblock %}

{% block content %}
    <h1>Create Account</h1>
    <p class="subtitle">Join us to get started with your journey</p>
    
    <form method="POST" action="{{ url_for('register.register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Choose a username" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Create a strong password" required>
        </div>
        
        <button type="submit" class="btn">Sign Up</button>
    </form>
    
    <div class="footer-line">
        <p class="footer-text">
            Already have an account? <a href="{{ url_for('login.login') }}">Log in</a>
        </p>
    </div>
{% endblock %}
